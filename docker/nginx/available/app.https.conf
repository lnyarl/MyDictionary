# HTTPS 설정 (인증서 발급 후 사용)

# ──────────────────────────────────────────────────────────────
# Security: Rate limiting & Bad bot/scanner blocking
# ──────────────────────────────────────────────────────────────

# Rate limiting zones (IP 기준)
limit_req_zone $binary_remote_addr zone=frontend:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api:10m      rate=120r/m;
limit_req_status 429;

# 알려진 스캐너/봇 User-Agent 탐지
map $http_user_agent $bad_bot {
    default     0;
    ""          1;  # User-Agent 없음
    ~*nikto     1;
    ~*sqlmap    1;
    ~*masscan   1;
    ~*zgrab     1;
    ~*dirbuster 1;
    ~*nuclei    1;
    ~*nmap      1;
    ~*hydra     1;
    ~*acunetix  1;
    ~*nessus    1;
    ~*openvas   1;
}

# ──────────────────────────────────────────────────────────────

# 모든 도메인 HTTP → HTTPS 리다이렉트 (ACME 챌린지 제외)
server {
    listen 80 default_server;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 메인 앱
server {
    listen 443 ssl;
    http2 on;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/${DOMAIN}/chain.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # 스캐너/봇 차단
    if ($bad_bot) { return 444; }

    # PHP/CMS/공통 취약점 경로 차단
    location ~* \.(php|asp|aspx|jsp|cgi)$ { return 444; }
    location ~* ^/(wp-admin|wp-login|wp-content|phpmyadmin|pma|\.env|\.git|xmlrpc\.php|actuator) {
        return 444;
    }

    # Rate limiting (분당 60회, 순간 최대 30회 허용)
    limit_req zone=frontend burst=30 nodelay;

    location / {
        proxy_pass         http://frontend;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_read_timeout 90;
    }
}

