version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: stashy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stashy
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-user.sh:/docker-entrypoint-initdb.d/init-user.sh
    networks:
      - stashy-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stashy-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: stashy
      FRONTEND_URL: http://localhost
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stashy-network
    volumes:
      - ./backend:/app
      - /app/node_modules

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stashy-frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:3000
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - stashy-network

  # Admin Backend API
  backend-admin:
    build:
      context: .
      dockerfile: backend-admin/Dockerfile
    container_name: stashy-backend-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: stashy
      JWT_SECRET: ${ADMIN_JWT_SECRET:-admin_jwt_secret_change_in_production}
      JWT_EXPIRES_IN: 8h
      ADMIN_FRONTEND_URL: http://localhost:81
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stashy-network
    volumes:
      - ./backend-admin:/app
      - /app/node_modules

  # Admin Frontend
  frontend-admin:
    build:
      context: .
      dockerfile: frontend-admin/Dockerfile
    container_name: stashy-frontend-admin
    restart: unless-stopped
    ports:
      - '81:80'
    depends_on:
      - backend-admin
    networks:
      - stashy-network

networks:
  stashy-network:
    driver: bridge

volumes:
  postgres_data:
