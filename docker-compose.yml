version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: stashy-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./backend:/app/backend
      - ./backend-admin:/app/backend-admin
    networks:
      - stashy-network-dev
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: stashy-redis-dev
    restart: unless-stopped
    command: redis-server --requirepass '${REDIS_PASSWORD}'
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis_data_dev:/data
    networks:
      - stashy-network-dev
    healthcheck:
      test: [ 'CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3 Compatible Storage)
  minio:
    image: minio/minio:latest
    container_name: stashy-minio-dev
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data_dev:/data
    networks:
      - stashy-network-dev
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create MinIO Buckets
  createbuckets:
    image: minio/mc
    container_name: stashy-createbuckets-dev
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c " /usr/bin/mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; /usr/bin/mc mb myminio/${AWS_S3_BUCKET_NAME:-stashy-bucket}; /usr/bin/mc anonymous set public myminio/${AWS_S3_BUCKET_NAME:-stashy-bucket}; exit 0; "
    networks:
      - stashy-network-dev

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stashy-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: '${REDIS_PASSWORD:-X9#kL2$mN7@pQ4!vR8^wT1&yU6*zA3%bC5}'
      REDIS_DB: 0
      FRONTEND_URL: http://localhost
      JWT_SECRET: ${JWT_SECRET:-jwt_secret_change_in_production}
      JWT_EXPIRES_IN: 8h
    ports:
      - '127.0.0.1:3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stashy-network-dev

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stashy-frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:3000
    ports:
      - '127.0.0.1:80:80'
    depends_on:
      - backend
    networks:
      - stashy-network-dev

  # Admin Backend API
  backend-admin:
    build:
      context: .
      dockerfile: backend-admin/Dockerfile
    container_name: stashy-backend-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      JWT_SECRET: ${ADMIN_JWT_SECRET:-admin_jwt_secret_change_in_production}
      JWT_EXPIRES_IN: 8h
      ADMIN_FRONTEND_URL: http://localhost:81
    ports:
      - '127.0.0.1:3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stashy-network-dev

  # Admin Frontend
  frontend-admin:
    build:
      context: .
      dockerfile: frontend-admin/Dockerfile
    container_name: stashy-frontend-admin
    restart: unless-stopped
    environment:
      - BACKEND_ADMIN_URL:http://backend-admin:3001
    ports:
      - '127.0.0.1:81:80'
    depends_on:
      - backend-admin
    networks:
      - stashy-network-dev

networks:
  stashy-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_dev:
  minio_data_dev:
