version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: stashy-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME} 
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-user.sh:/docker-entrypoint-initdb.d/init-user.sh
    networks:
      - stashy-network
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres -d stashy' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: stashy-redis
    restart: unless-stopped
    command: redis-server --requirepass '${REDIS_PASSWORD:-X9#kL2$mN7@pQ4!vR8^wT1&yU6*zA3%bC5}'
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - stashy-network
    healthcheck:
      test: [ 'CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-X9#kL2$mN7@pQ4!vR8^wT1&yU6*zA3%bC5}', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stashy-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: "[fiTgkCxEn@^2hG@7K74"
      DB_DATABASE: stashy
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: '${REDIS_PASSWORD:-X9#kL2$mN7@pQ4!vR8^wT1&yU6*zA3%bC5}'
      REDIS_DB: 0
      FRONTEND_URL: http://localhost
      JWT_SECRET: ${JWT_SECRET:-jwt_secret_change_in_production}
      JWT_EXPIRES_IN: 8h
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stashy-network

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: stashy-frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:3000
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - stashy-network

  # Admin Backend API
  backend-admin:
    build:
      context: .
      dockerfile: backend-admin/Dockerfile
    container_name: stashy-backend-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: "[fiTgkCxEn@^2hG@7K74"
      DB_DATABASE: stashy
      JWT_SECRET: ${ADMIN_JWT_SECRET:-admin_jwt_secret_change_in_production}
      JWT_EXPIRES_IN: 8h
      ADMIN_FRONTEND_URL: http://localhost:81
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - stashy-network

  # Admin Frontend
  frontend-admin:
    build:
      context: .
      dockerfile: frontend-admin/Dockerfile
    container_name: stashy-frontend-admin
    restart: unless-stopped
    ports:
      - '81:80'
    depends_on:
      - backend-admin
    networks:
      - stashy-network

networks:
  stashy-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
