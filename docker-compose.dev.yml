version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: stashy-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME} 
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./backend:/app/backend
      - ./backend-admin:/app/backend-admin
    networks:
      - stashy-network-dev
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d stashy']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  stashy-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
