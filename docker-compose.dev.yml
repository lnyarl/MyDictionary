version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: stashy-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stashy
      PGDATA: /var/lib/postgresql/data/pgdata
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_DATABASE: stashy
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./docker/postgres/init-user.sh:/docker-entrypoint-initdb.d/init-user.sh
      - ./backend:/app/backend
      - ./backend-admin:/app/backend-admin
    networks:
      - stashy-network-dev
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d stashy']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  stashy-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
