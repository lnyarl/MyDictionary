version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: stashy-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./backend:/app/backend
      - ./backend-admin:/app/backend-admin
    networks:
      - stashy-network-dev
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres -d stashy' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: stashy-redis-dev
    restart: unless-stopped
    command: redis-server --requirepass '${REDIS_PASSWORD}'
    ports:
      - '6379:6379'
    volumes:
      - redis_data_dev:/data
    networks:
      - stashy-network-dev
    healthcheck:
      test: [ 'CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  stashy-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_dev:
