version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    container_name: stashy-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./backend:/app/backend
      - ./backend-admin:/app/backend-admin
    networks:
      - stashy-network-dev
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U postgres -d stashy' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: stashy-redis-dev
    restart: unless-stopped
    command: redis-server --requirepass '${REDIS_PASSWORD}'
    ports:
      - '6379:6379'
    volumes:
      - redis_data_dev:/data
    networks:
      - stashy-network-dev
    healthcheck:
      test: [ 'CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping' ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3 Compatible Storage)
  minio:
    image: minio/minio:latest
    container_name: stashy-minio-dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data_dev:/data
    networks:
      - stashy-network-dev
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Create MinIO Buckets
  createbuckets:
    image: minio/mc
    container_name: stashy-createbuckets-dev
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/${AWS_S3_BUCKET_NAME:-stashy-bucket};
      /usr/bin/mc anonymous set public myminio/${AWS_S3_BUCKET_NAME:-stashy-bucket};
      exit 0;
      "
    networks:
      - stashy-network-dev

networks:
  stashy-network-dev:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_dev:
  minio_data_dev:
